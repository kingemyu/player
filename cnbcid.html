<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Player</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.11/shaka-player.compiled.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        .player-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>
<body>

<div class="player-container">
    <video id="video"
           autoplay
           controls
           playsinline>
    </video>
</div>

<script>
async function initPlayer() {
    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser tidak mendukung Shaka Player');
        return;
    }

    const video = document.getElementById('video');
    const player = new shaka.Player(video);

    player.addEventListener('error', (event) => {
        console.error('Shaka Error:', event.detail);
    });

    // Buat tombol unmute
    const unmuteBtn = document.createElement('button');
    unmuteBtn.id = 'unmuteBtn';
    unmuteBtn.innerText = 'CLICK HERE TO UNMUTE';

    Object.assign(unmuteBtn.style, {
        position: 'absolute',
        top: '50%',
        left: '50%',
        transform: 'translate(-50%, -50%)',
        zIndex: '9999',
        padding: '12px 24px',
        fontSize: '20px',
        color: '#fff',
        background: 'rgba(0,0,0,0.55)',
        border: '2px solid rgba(255,255,255,0.8)',
        borderRadius: '8px',
        cursor: 'pointer',
        backdropFilter: 'blur(4px)',
        WebkitBackdropFilter: 'blur(4px)',
        transition: 'opacity .3s ease'
    });

    document.querySelector('.player-container').style.position = 'relative';
    document.querySelector('.player-container').appendChild(unmuteBtn);

    // Klik tombol untuk unmute
    unmuteBtn.addEventListener('click', async () => {
        try {
            video.muted = false;
            video.volume = 1;
            await video.play();

            unmuteBtn.style.opacity = '0';
            unmuteBtn.style.pointerEvents = 'none';
        } catch (err) {
            console.error('Unmute gagal:', err);
        }
    });

    // Sembunyikan tombol jika user unmute dari kontrol video
    video.addEventListener('volumechange', () => {
        if (!video.muted && video.volume > 0) {
            unmuteBtn.style.opacity = '0';
            unmuteBtn.style.pointerEvents = 'none';
        } else {
            unmuteBtn.style.opacity = '1';
            unmuteBtn.style.pointerEvents = 'auto';
        }
    });

    try {
        await player.load(
            'https://live.cnbcindonesia.com/livecnbc/smil:cnbctv.smil/playlist.m3u8'
        );
        console.log('Stream berhasil dimuat');
    } catch (error) {
        console.error('Load Error:', error);
    }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>

</body>
</html>
