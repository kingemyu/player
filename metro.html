<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Player</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.11/shaka-player.compiled.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        .player-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>
<body>

<div class="player-container">
    <video id="video"
           autoplay
           controls
           playsinline>
    </video>
</div>

<script>
async function initPlayer() {
    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser tidak mendukung Shaka Player');
        return;
    }

    const video = document.getElementById('video');
    const player = new shaka.Player(video);

    player.addEventListener('error', (event) => {
        console.error('Shaka Error:', event.detail);
    });

    try {
        await player.load('https://edge.medcom.id/live-edge/smil:metro.smil/playlist.m3u8');
        console.log('Stream berhasil dimuat');
    } catch (error) {
        console.error('Load Error:', error);
    }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>

</body>
</html>
